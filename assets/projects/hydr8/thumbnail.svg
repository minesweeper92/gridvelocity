<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#0B0D14"/>
  <rect x="0" y="0" width="800" height="600" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0D14;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1A2035;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Water ripple circles -->
  <circle cx="400" cy="300" r="80"  fill="none" stroke="#3EA0C8" stroke-width="1.5" opacity="0.25"/>
  <circle cx="400" cy="300" r="140" fill="none" stroke="#3EA0C8" stroke-width="1"   opacity="0.15"/>
  <circle cx="400" cy="300" r="200" fill="none" stroke="#3EA0C8" stroke-width="0.8" opacity="0.08"/>
  <!-- Wordmark -->
  <text x="400" y="290" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900"
        font-size="72" letter-spacing="-2" fill="#ffffff" opacity="0.92">HYDR8</text>
  <text x="400" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400"
        font-size="13" letter-spacing="6" fill="#3EA0C8" opacity="0.7">VIDEO PRODUCTION</text>
  <!-- MOCK badge -->
  <rect x="20" y="20" width="80" height="28" rx="4" fill="#EF4823" opacity="0.9"/>
  <text x="60" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700"
        font-size="11" letter-spacing="2" fill="#ffffff">MOCK</text>
</svg>
